<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Quest">
<title>English Quest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --sky: #1a1a2e;
    --gold: #f5a623;
    --gold2: #ffcf00;
    --green: #00c896;
    --red: #ff5252;
    --purple: #a855f7;
    --blue: #38bdf8;
    --white: #f0f4ff;
    --card: rgba(255,255,255,0.07);
    --card-border: rgba(255,255,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    color: var(--white);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  #app { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

  .screen {
    display: none; flex-direction: column; align-items: center;
    width: 100%; height: 100%;
    padding: 20px 16px 30px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home { justify-content: center; gap: 0; }

  .logo-area { text-align: center; margin-bottom: 32px; animation: floatIn 0.6s ease both; }
  .logo-icon { font-size: 56px; line-height: 1; margin-bottom: 6px; }
  .logo-title {
    font-family: 'Fredoka One', cursive; font-size: 40px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-sub {
    font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 3px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  }

  /* Vertical stacked menu */
  .menu-list {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; max-width: 360px;
    animation: floatIn 0.6s 0.15s ease both;
  }
  .menu-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 0;
    display: flex; align-items: center; gap: 18px;
    cursor: pointer; position: relative; overflow: hidden;
    -webkit-user-select: none; user-select: none; transition: transform 0.15s;
    height: 80px; padding: 0 22px;
  }
  .menu-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    opacity: 0; transition: opacity 0.15s;
  }
  .menu-card.c1::before { background: linear-gradient(90deg, rgba(245,166,35,0.2), transparent); }
  .menu-card.c3::before { background: linear-gradient(90deg, rgba(168,85,247,0.2), transparent); }
  .menu-card.c4::before { background: linear-gradient(90deg, rgba(56,189,248,0.2), transparent); }
  .menu-card:active { transform: scale(0.97); }
  .menu-card:active::before { opacity: 1; }

  .menu-icon-wrap {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .menu-card.c1 .menu-icon-wrap { background: rgba(245,166,35,0.15); }
  .menu-card.c3 .menu-icon-wrap { background: rgba(168,85,247,0.15); }
  .menu-card.c4 .menu-icon-wrap { background: rgba(56,189,248,0.15); }

  .menu-text { flex: 1; }
  .menu-name { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--white); line-height: 1; }
  .menu-desc { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 700; margin-top: 3px; }

  .menu-arrow { font-size: 20px; color: rgba(255,255,255,0.2); flex-shrink: 0; }

  /* ── GAME HEADER ── */
  .game-header {
    display: flex; align-items: center;
    width: 100%; max-width: 420px;
    margin-bottom: 20px; gap: 12px; flex-shrink: 0;
  }
  .back-btn {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer; flex-shrink: 0; transition: transform 0.15s;
  }
  .back-btn:active { transform: scale(0.9); }
  .game-title { font-family: 'Fredoka One', cursive; font-size: 22px; }

  .game-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 24px; padding: 28px 22px;
    width: 100%; max-width: 420px; flex-shrink: 0;
  }

  /* ─────────────────────────────
     GAME 1: READ IT
  ───────────────────────────── */
  .input-phase { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
  .dad-input {
    width: 100%; background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 16px 18px; color: var(--white);
    font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700;
    outline: none; transition: border-color 0.2s;
  }
  .dad-input:focus { border-color: var(--gold); }
  .dad-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 600; }
  .show-btn {
    width: 100%; padding: 16px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #000; font-family: 'Fredoka One', cursive; font-size: 20px;
    cursor: pointer; box-shadow: 0 4px 20px rgba(245,166,35,0.3); transition: transform 0.15s;
  }
  .show-btn:active { transform: scale(0.97); box-shadow: none; }

  /* Full-screen display overlay */
  .display-phase {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: var(--sky); flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 28px; cursor: pointer;
  }
  .display-phase.active { display: flex; }
  .display-tap-hint {
    position: absolute; bottom: 40px;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.2); letter-spacing: 1px; text-transform: uppercase;
  }
  .big-read-text {
    font-family: 'Fredoka One', cursive;
    font-size: 60px; text-align: center; line-height: 1.2;
    color: var(--gold2); word-break: break-word;
    text-shadow: 0 0 60px rgba(255,207,0,0.25);
  }

  /* ─────────────────────────────
     GAME 2: FILL THE GAP
  ───────────────────────────── */
  #game2 { justify-content: flex-start; }

  /* Hint emoji above the sentence */
  .fill-emoji-hint {
    font-size: 72px; text-align: center; line-height: 1;
    display: block; margin-bottom: 18px;
  }

  .fill-sentence {
    font-size: 28px; font-weight: 800;
    text-align: center; line-height: 1.7;
    min-height: 70px; margin-bottom: 24px;
  }
  .blank-slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 38px; height: 46px;
    border-radius: 10px;
    background: rgba(168,85,247,0.15);
    border: 2px dashed var(--purple);
    color: var(--purple);
    font-family: 'Fredoka One', cursive; font-size: 30px;
    margin: 0 3px; vertical-align: middle;
    transition: background 0.2s, border-color 0.2s;
  }
  .blank-slot.filled {
    background: rgba(0,200,150,0.15); border-color: var(--green); color: var(--green);
  }

  .letter-options {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 20px;
  }
  .letter-btn {
    width: 58px; height: 58px; border-radius: 14px;
    border: 2px solid var(--card-border);
    background: rgba(255,255,255,0.07);
    color: var(--white); font-family: 'Fredoka One', cursive; font-size: 28px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; -webkit-user-select: none; user-select: none;
  }
  .letter-btn:active { transform: scale(0.9); }
  .letter-btn.correct-flash { background: rgba(0,200,150,0.3); border-color: var(--green); }
  .letter-btn.wrong-flash   { background: rgba(255,82,82,0.3);  border-color: var(--red); }

  .fill-feedback {
    text-align: center; font-family: 'Fredoka One', cursive; font-size: 22px; min-height: 32px;
  }
  .fill-feedback.correct { color: var(--green); }
  .fill-feedback.wrong   { color: var(--red); }

  /* ─────────────────────────────
     GAME 3: WORD MATCH
  ───────────────────────────── */
  #game3 { justify-content: flex-start; }

  .match-question {
    font-size: 13px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 2px; color: rgba(255,255,255,0.3);
    text-align: center; margin-bottom: 10px;
  }
  .match-emoji { font-size: 84px; text-align: center; line-height: 1; display: block; padding-bottom: 10px; }

  .match-choices {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    width: 100%; max-width: 420px; margin-top: 20px; margin-bottom: 16px;
  }
  .choice-btn {
    padding: 20px 10px; border-radius: 16px;
    border: 2px solid var(--card-border); background: rgba(255,255,255,0.06);
    color: var(--white); font-family: 'Fredoka One', cursive; font-size: 22px;
    cursor: pointer; text-align: center; transition: all 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.correct-choice { background: rgba(0,200,150,0.2); border-color: var(--green); color: var(--green); }
  .choice-btn.wrong-choice   { background: rgba(255,82,82,0.2);  border-color: var(--red);   color: var(--red); }

  .match-feedback {
    text-align: center; font-family: 'Fredoka One', cursive; font-size: 24px;
    min-height: 32px; width: 100%; max-width: 420px;
  }
  .match-feedback.correct { color: var(--green); }
  .match-feedback.wrong   { color: var(--red); }

  /* ── ANIMS ── */
  @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .pop { animation: pop 0.3s ease; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- ══ HOME ══ -->
  <div class="screen active" id="home">
    <div class="logo-area">
      <div class="logo-icon">⚔️</div>
      <div class="logo-title">English Quest</div>
      <div class="logo-sub">Level up your English</div>
    </div>
    <div class="menu-list">
      <div class="menu-card c1" onclick="openGame(1)">
        <div class="menu-icon-wrap">📖</div>
        <div class="menu-text">
          <div class="menu-name">Read It!</div>
          <div class="menu-desc">Type a word or sentence</div>
        </div>
        <div class="menu-arrow">›</div>
      </div>
      <div class="menu-card c3" onclick="openGame(2)">
        <div class="menu-icon-wrap">🧩</div>
        <div class="menu-text">
          <div class="menu-name">Fill the Gap</div>
          <div class="menu-desc">Find the missing letter</div>
        </div>
        <div class="menu-arrow">›</div>
      </div>
      <div class="menu-card c4" onclick="openGame(3)">
        <div class="menu-icon-wrap">🗺️</div>
        <div class="menu-text">
          <div class="menu-name">Word Match</div>
          <div class="menu-desc">Match the picture to the word</div>
        </div>
        <div class="menu-arrow">›</div>
      </div>
    </div>
  </div>

  <!-- ══ GAME 1: READ IT ══ -->
  <div class="screen" id="game1">
    <div class="game-header">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="game-title">📖 Read It!</div>
    </div>
    <div class="input-phase">
      <input class="dad-input" id="dad-input" type="text"
        placeholder="Type a word or sentence…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="show-btn" onclick="showReadDisplay()">Show! 👀</button>
    </div>
  </div>

  <!-- Read It full-screen display -->
  <div class="display-phase" id="g1-display" onclick="hideReadDisplay()">
    <div class="big-read-text" id="read-display"></div>
    <div class="display-tap-hint">Tap anywhere to go back</div>
  </div>

  <!-- ══ GAME 2: FILL THE GAP ══ -->
  <div class="screen" id="game2">
    <div class="game-header">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="game-title">🧩 Fill the Gap</div>
    </div>
    <div class="game-card">
      <span class="fill-emoji-hint" id="fill-emoji-hint">🐱</span>
      <div class="fill-sentence" id="fill-sentence">Loading…</div>
      <div class="letter-options" id="letter-options"></div>
      <div class="fill-feedback" id="fill-feedback"></div>
    </div>
  </div>

  <!-- ══ GAME 3: WORD MATCH ══ -->
  <div class="screen" id="game3">
    <div class="game-header">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="game-title">🗺️ Word Match</div>
    </div>
    <div class="game-card">
      <div class="match-question">What does this show?</div>
      <span class="match-emoji" id="match-emoji">🐱</span>
    </div>
    <div class="match-choices" id="match-choices"></div>
    <div class="match-feedback" id="match-feedback"></div>
  </div>

</div>

<script>
// ── SCREENS ──
function openGame(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('game' + n).classList.add('active');
  if (n === 2) initFill();
  if (n === 3) initMatch();
}
function goHome() {
  document.getElementById('g1-display').classList.remove('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home').classList.add('active');
}

// ── GAME 1: READ IT ──
function showReadDisplay() {
  const val = document.getElementById('dad-input').value.trim();
  if (!val) return;
  const el = document.getElementById('read-display');
  el.classList.remove('pop');
  void el.offsetWidth;
  el.textContent = val;
  el.classList.add('pop');
  document.getElementById('g1-display').classList.add('active');
}
function hideReadDisplay() {
  document.getElementById('g1-display').classList.remove('active');
  document.getElementById('dad-input').value = '';
  document.getElementById('dad-input').focus();
}
document.getElementById('dad-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') showReadDisplay();
});

// ── GAME 2: FILL THE GAP ──
const fillData = [
  { emoji: '🐱', sentence: 'The _at is on the mat.',    word: 'cat',   missing: 0 },
  { emoji: '🐶', sentence: 'I see a do_ in the park.',  word: 'dog',   missing: 2 },
  { emoji: '☀️', sentence: 'The su_ is very hot.',      word: 'sun',   missing: 2 },
  { emoji: '🏃', sentence: 'He can ru_ fast.',          word: 'run',   missing: 2 },
  { emoji: '🐦', sentence: 'The bir_ can fly.',         word: 'bird',  missing: 3 },
  { emoji: '😋', sentence: 'I like to ea_ cake.',       word: 'eat',   missing: 2 },
  { emoji: '🐟', sentence: 'The fis_ is in the sea.',   word: 'fish',  missing: 3 },
  { emoji: '📚', sentence: 'She reads a boo_.',         word: 'book',  missing: 3 },
  { emoji: '🥛', sentence: 'He drinks mil_.',           word: 'milk',  missing: 3 },
  { emoji: '🐸', sentence: 'The fro_ can jump.',        word: 'frog',  missing: 3 },
  { emoji: '🌳', sentence: 'We play in the par_.',      word: 'park',  missing: 3 },
  { emoji: '🌲', sentence: 'The tre_ is very tall.',    word: 'tree',  missing: 3 },
  { emoji: '⚽', sentence: 'He kicks the bal_.',        word: 'ball',  missing: 3 },
  { emoji: '🐝', sentence: 'The _ee likes flowers.',    word: 'bee',   missing: 0 },
  { emoji: '🚲', sentence: 'I ride my bik_.',           word: 'bike',  missing: 3 },
  { emoji: '🎂', sentence: 'The cake is swee_.',        word: 'sweet', missing: 4 },
  { emoji: '👗', sentence: 'She has a pin_ dress.',     word: 'pink',  missing: 3 },
  { emoji: '🌧️', sentence: 'The rai_ falls down.',     word: 'rain',  missing: 3 },
  { emoji: '🔴', sentence: 'I have a re_ ball.',        word: 'red',   missing: 2 },
  { emoji: '🏠', sentence: 'The do_ is in the house.',  word: 'dog',   missing: 2 },
];

let fillQueue = [];
let currentFill = null;

function initFill() {
  fillQueue = shuffled(fillData.length);
  loadFill();
}

function loadFill() {
  if (fillQueue.length === 0) fillQueue = shuffled(fillData.length);
  currentFill = fillData[fillQueue.shift()];
  renderFill();
}

function renderFill() {
  const { emoji, sentence, word, missing } = currentFill;

  document.getElementById('fill-emoji-hint').textContent = emoji;

  const sentenceHtml = sentence.replace('_', `<span class="blank-slot" id="blank-box">_</span>`);
  document.getElementById('fill-sentence').innerHTML = sentenceHtml;

  const correct = word[missing];
  const pool = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(l => l !== correct);
  const wrong = pool.sort(() => Math.random() - 0.5).slice(0, 5);
  const allLetters = [correct, ...wrong].sort(() => Math.random() - 0.5);

  const container = document.getElementById('letter-options');
  container.innerHTML = '';
  allLetters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter.toUpperCase();
    btn.onclick = () => tapLetter(letter, btn);
    container.appendChild(btn);
  });

  document.getElementById('fill-feedback').textContent = '';
  document.getElementById('fill-feedback').className = 'fill-feedback';
}

function tapLetter(letter, btn) {
  const correct = currentFill.word[currentFill.missing];
  const fb = document.getElementById('fill-feedback');
  const blank = document.getElementById('blank-box');

  if (letter === correct) {
    blank.textContent = letter.toUpperCase();
    blank.classList.add('filled');
    btn.classList.add('correct-flash');
    fb.textContent = '✅ Well done!';
    fb.className = 'fill-feedback correct';
    document.querySelectorAll('.letter-btn').forEach(b => b.style.pointerEvents = 'none');
    setTimeout(loadFill, 1000);
  } else {
    btn.classList.add('wrong-flash');
    fb.textContent = '❌ Try another!';
    fb.className = 'fill-feedback wrong';
    setTimeout(() => {
      btn.classList.remove('wrong-flash');
      fb.textContent = '';
      fb.className = 'fill-feedback';
    }, 600);
  }
}

// ── GAME 3: WORD MATCH ──
const matchData = [
  { emoji: '🐱', word: 'cat',       wrong: ['dog',    'hat',    'bus']     },
  { emoji: '🐶', word: 'dog',       wrong: ['cat',    'cup',    'sun']     },
  { emoji: '🍎', word: 'apple',     wrong: ['ball',   'book',   'frog']    },
  { emoji: '☀️', word: 'sun',       wrong: ['pen',    'ant',    'map']     },
  { emoji: '🐸', word: 'frog',      wrong: ['cake',   'sock',   'door']    },
  { emoji: '🚗', word: 'car',       wrong: ['egg',    'hat',    'bee']     },
  { emoji: '🌲', word: 'tree',      wrong: ['milk',   'net',    'bell']    },
  { emoji: '🐟', word: 'fish',      wrong: ['king',   'box',    'jam']     },
  { emoji: '🍞', word: 'bread',     wrong: ['jump',   'hill',   'lamp']    },
  { emoji: '🐦', word: 'bird',      wrong: ['sand',   'tent',   'rain']    },
  { emoji: '🏠', word: 'house',     wrong: ['boat',   'fork',   'leaf']    },
  { emoji: '📚', word: 'book',      wrong: ['rock',   'frog',   'shoe']    },
  { emoji: '🎂', word: 'cake',      wrong: ['hand',   'wolf',   'pin']     },
  { emoji: '🐝', word: 'bee',       wrong: ['fox',    'arm',    'jar']     },
  { emoji: '🚌', word: 'bus',       wrong: ['top',    'ant',    'log']     },
  { emoji: '🥛', word: 'milk',      wrong: ['web',    'net',    'fog']     },
  { emoji: '⭐', word: 'star',      wrong: ['road',   'drum',   'pot']     },
  { emoji: '🌙', word: 'moon',      wrong: ['door',   'fish',   'cup']     },
  { emoji: '🎈', word: 'balloon',   wrong: ['table',  'spoon',  'clock']   },
  { emoji: '🦋', word: 'butterfly', wrong: ['pencil', 'finger', 'window']  },
];

let matchQueue = [];
let currentMatch = null;
let matchLocked = false;

function initMatch() {
  matchQueue = shuffled(matchData.length);
  nextMatch();
}

function nextMatch() {
  if (matchQueue.length === 0) matchQueue = shuffled(matchData.length);
  matchLocked = false;
  currentMatch = matchData[matchQueue.shift()];

  document.getElementById('match-emoji').textContent = currentMatch.emoji;
  document.getElementById('match-feedback').textContent = '';
  document.getElementById('match-feedback').className = 'match-feedback';

  const choices = [currentMatch.word, ...currentMatch.wrong].sort(() => Math.random() - 0.5);
  const container = document.getElementById('match-choices');
  container.innerHTML = '';
  choices.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = word.charAt(0).toUpperCase() + word.slice(1);
    btn.onclick = () => tapChoice(word, btn);
    container.appendChild(btn);
  });
}

function tapChoice(word, btn) {
  if (matchLocked) return;
  matchLocked = true;
  if (word === currentMatch.word) {
    btn.classList.add('correct-choice');
    document.getElementById('match-feedback').textContent = '🎉 Correct!';
    document.getElementById('match-feedback').className = 'match-feedback correct';
    setTimeout(nextMatch, 1200);
  } else {
    btn.classList.add('wrong-choice');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent.toLowerCase() === currentMatch.word) b.classList.add('correct-choice');
    });
    document.getElementById('match-feedback').textContent = '❌ Try again!';
    document.getElementById('match-feedback').className = 'match-feedback wrong';
    // Re-insert current word randomly back into remaining queue
    const idx = matchData.indexOf(currentMatch);
    const reinsert = Math.floor(Math.random() * (matchQueue.length + 1));
    matchQueue.splice(reinsert, 0, idx);
    setTimeout(nextMatch, 1600);
  }
}

// ── UTILS ──
function shuffled(n) {
  return Array.from({ length: n }, (_, i) => i).sort(() => Math.random() - 0.5);
}
